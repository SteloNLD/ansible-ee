version: 3

images:
  base_image:
    name: ubuntu:24.04

additional_build_steps:
  prepend_base:
    - RUN apt-get update && apt-get install -y python3 python3-pip python3-venv && rm -rf /var/lib/apt/lists/*
    - ENV PIP_BREAK_SYSTEM_PACKAGES=1

dependencies:
  python:
    - ansible-core
    - ansible-lint
  galaxy:
    collections:
      - name: community.general
      - name: community.crypto
      - name: ansible.posix
